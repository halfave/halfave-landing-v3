<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title + meta (overridden per-page by React) -->
    <title>Half Ave — NYC Building Health Score</title>
    <meta name="description" content="Look up any NYC rental building's health score. Instant compliance data — HPD violations, DOB violations, inspection status, and peer comparison across 34,000+ buildings." />

    <!-- Open Graph (for social sharing + AI crawlers) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://halfave.co/" />
    <meta property="og:title"       content="Half Ave — NYC Building Health Score" />
    <meta property="og:description" content="Instant NYC building compliance data. HPD violations, DOB violations, inspection status, and health scores for 34,000+ NYC rental buildings." />
    <meta property="og:image"       content="https://halfave.co/og-image.png" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Half Ave — NYC Building Health Score" />
    <meta name="twitter:description" content="Instant NYC building compliance data. HPD violations, DOB violations, inspection status, and health scores for 34,000+ NYC rental buildings." />
    <meta name="twitter:image"       content="https://halfave.co/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://halfave.co/" />

    <!-- Keywords (still read by some crawlers and AI indexers) -->
    <meta name="keywords" content="NYC building health score, HPD violations NYC, DOB violations NYC, NYC building compliance, NYC rental building violations, building inspection NYC, ECB violations NYC, NYC property management, Half Ave" />

    <!-- Authorship + indexing -->
    <meta name="author"  content="Half Ave" />
    <meta name="robots"  content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
